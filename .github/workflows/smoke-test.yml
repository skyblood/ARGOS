name: Smoke Test
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test --if-present

  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package argos-core for Veracode
        run: |
          zip -r veracode-artifact.zip \
            packages/argos-core/src/ \
            packages/argos-core/package.json
      - uses: actions/upload-artifact@v4
        with:
          name: veracode-artifact
          path: veracode-artifact.zip
