name: Publish Docker Image + NPM Package
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - run: npm ci
      - run: npm run build
      - run: npm publish -w packages/argos-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argos:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/argos:latest

      - uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          cosign sign --yes "ghcr.io/${IMAGE_OWNER}/argos:${IMAGE_TAG}"

      - name: Dogfood SCA scan
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          VERACODE_API_KEY: ${{ secrets.VERACODE_API_KEY }}
        run: |
          docker run --rm \
            -e VERACODE_API_KEY="${VERACODE_API_KEY}" \
            -e ARGOS_TENANT=incodacorp-internal \
            "ghcr.io/${IMAGE_OWNER}/argos:${IMAGE_TAG}" \
            scan --scan-type sca --threshold CRITICAL
        continue-on-error: true
