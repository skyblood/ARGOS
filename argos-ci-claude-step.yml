# Drop this block into your pr-checks.yml after the Veracode Pipeline Scan job.
# Requires: ANTHROPIC_API_KEY secret, pull-requests write permission.
# The veracode-pipeline-scan job must upload artifact: veracode-pipeline-scan-results
# containing veracode-results.json (JSON output from veracode/Veracode-pipeline-scan-action).

  claude-security-review:
    needs: veracode-pipeline-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Veracode results
        uses: actions/download-artifact@v4
        with:
          name: veracode-pipeline-scan-results
          path: ./veracode-output

      - name: Build Claude prompt with findings
        run: |
          python3 - <<'PYEOF'
          import json, os

          try:
              with open('./veracode-output/veracode-results.json') as f:
                  data = json.load(f)
          except FileNotFoundError:
              data = {}

          findings = data.get('findings', [])
          findings.sort(key=lambda f: f.get('severity', 0), reverse=True)
          top = findings[:20]

          lines = []
          for f in top:
              src = f.get('files', {}).get('source_file', {})
              sev = f.get('severity', '?')
              cwe = f.get('cwe_id', '?')
              title = f.get('title', 'Unknown')
              file_path = src.get('file', '?')
              line = src.get('line', '?')
              text = f.get('display_text', '')[:200]
              lines.append(f"- [SEV {sev}] CWE-{cwe}: {title} — {file_path}:{line} — {text}")

          summary = '\n'.join(lines) if lines else 'No findings.'

          prompt = f"""Review this PR for security issues based on Veracode Pipeline Scan findings.
          Prioritize: verify if each finding is exploitable in context, suggest minimal fixes,
          and flag any finding that touches authentication, tenant isolation, or audit logging.

          ## Veracode Pipeline Scan Findings
          {summary[:6000]}

          ## Security Constraints
          - No hardcoded credentials — env vars only
          - Validate all external input at system boundaries
          - Non-root user in Docker context
          """

          with open('veracode-prompt.txt', 'w') as out:
              out.write(prompt)
          PYEOF

      - name: Claude PR review with Veracode context
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: veracode-prompt.txt
          allowed_tools: "view,github"
          # Do NOT allow Edit/Write — Claude annotates only, does not auto-commit
